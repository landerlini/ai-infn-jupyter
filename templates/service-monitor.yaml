apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-metrics-secret
type: Opaque
stringData:
  token: {{ .Values.jhubMetricApiKey }}

--- 

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-metrics-secret
  labels:
    release: prometheus-stack 
spec:
  jobLabel: jhub 

  # Seleziona il Service Kubernetes creato/etichettato nel punto 2
  selector:
    matchLabels:
      component: hub
      app.kubernetes.io/name: jupyterhub

  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}

  endpoints:
  - port: hub
    interval: 10s     
    path: /hub/metrics 
    
    # Configura l'autenticazione Bearer Token usando il Secret del punto 1
    bearerTokenSecret:
      name: jhub-metrics-secret 
      key: token                

