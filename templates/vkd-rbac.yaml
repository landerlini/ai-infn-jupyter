# Create the namespace where running the jobs
# Notice! The roles below refer to the namespace with the
# capabilities of *launching* (rather than running) the jobs.

{{ if .Values.vkdEnabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.vkdNamespace }}

{{ end }}

---

{{ if .Values.vkdEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name -}}-{{ .Values.vkdAdminServiceAccount | default "vkd-admin" }}
  labels:
    app: {{ .Release.Name -}}-vkd
    component: vkd
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - "batch"
  resources:
  - jobs
  verbs:
  - get
  - watch
  - list
  - delete
  - create

- apiGroups:
  - "scheduling.k8s.io"
  resources:
  - priorityclasses
  verbs:
  - get
  - watch
  - patch
  - list
  - delete
  - create

- apiGroups:
  - "kueue.x-k8s.io"
  resources:
  - workloads
  - localqueues
  - clusterqueues
  - resourceflavors
  verbs:
  - get
  - watch
  - list
  - create
  - patch
  - delete
  - update

{{ end }}
---

{{ if .Values.vkdEnabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Release.Name }}-{{ .Values.vkdAdminServiceAccount | default "vkd-admin" }}
{{ end }}

---

{{ if .Values.vkdEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app: {{ .Release.Name }}-vkd
  name: {{ .Release.Name}}-{{ .Values.vkdAdminServiceAccount | default "vkd-admin" }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name -}}-{{ .Values.vkdAdminServiceAccount | default "vkd-admin" }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-{{ .Values.vkdAdminServiceAccount | default "vkd-admin" }}
  namespace: {{ .Release.Namespace }}
{{ end }}

---

{{ if .Values.vkdEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name -}}-{{ .Values.vkdUserServiceAccount | default "vkd-user" }}
  labels:
    app: {{ .Release.Name -}}-vkd
    component: vkd
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - "batch"
  resources:
  - jobs
  verbs:
  - get
  - watch
  - list
  - delete
  - create

- apiGroups:
  - "scheduling.k8s.io"
  resources:
  - priorityclasses
  verbs:
  - get
  - watch
  - list

- apiGroups:
  - "kueue.x-k8s.io"
  resources:
  - workloads
  - clusterqueues
  - resourceflavors
  verbs:
  - get
  - watch
  - list

- apiGroups:
  - "kueue.x-k8s.io"
  resources:
  - localqueues
  verbs:
  - get
  - watch
  - list
  - create
  - patch
  - delete
  - update

{{ end }}
---

{{ if .Values.vkdEnabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Release.Name }}-{{ .Values.vkdUserServiceAccount | default "vkd-user" }}
{{ end }}

---

{{ if .Values.vkdEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app: {{ .Release.Name }}-vkd
  name: {{ .Release.Name}}-{{ .Values.vkdUserServiceAccount | default "vkd-user" }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name -}}-{{ .Values.vkdUserServiceAccount | default "vkd-user" }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-{{ .Values.vkdUserServiceAccount | default "vkd-user" }}
  namespace: {{ .Release.Namespace }}
{{ end }}


